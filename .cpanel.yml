---
deployment:
  tasks:
    # Set deployment path
    - export DEPLOYPATH=/home/$(whoami)/e-com
    
    # Create e-com directory
    - /bin/mkdir -p $DEPLOYPATH
    
    # Navigate to backend and install dependencies
    - cd backend && /usr/bin/npm install
    
    # Build the backend
    - cd backend && /usr/bin/npm run build
    
    # Copy built files to deployment directory
    - /bin/cp -r backend/dist/* $DEPLOYPATH/
    
    # Copy package files
    - /bin/cp backend/package.json $DEPLOYPATH/
    - /bin/cp backend/package-lock.json $DEPLOYPATH/
    
    # Copy .env file
    - /bin/cp backend/.env $DEPLOYPATH/
    
    # Copy drizzle config
    - /bin/cp backend/drizzle.config.ts $DEPLOYPATH/
    
    # Copy database migrations
    - /bin/mkdir -p $DEPLOYPATH/migrations
    - /bin/cp -r backend/src/database/migrations/* $DEPLOYPATH/migrations/
    
    # Install production dependencies
    - cd $DEPLOYPATH && /usr/bin/npm install --production
    
    # Run database migrations
    - cd $DEPLOYPATH && /usr/bin/npm run migrate:run