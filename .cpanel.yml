---
deployment:
  tasks:
    # Set deployment path
    - export DEPLOYPATH=/home/$(whoami)/e-com
    
    # Create e-com directory
    - /bin/mkdir -p $DEPLOYPATH
    
    # Copy built backend files (must be built locally before push)
    - /bin/cp -r backend/dist $DEPLOYPATH/
    
    # Copy frontend build
    - /bin/cp -r backend/front-end-build $DEPLOYPATH/
    
    # Copy package files
    - /bin/cp backend/package.json $DEPLOYPATH/
    - /bin/cp backend/package-lock.json $DEPLOYPATH/
    
    # Copy .env file
    - /bin/cp backend/.env $DEPLOYPATH/
    
    # Copy drizzle config
    - /bin/cp backend/drizzle.config.ts $DEPLOYPATH/
    
    # Copy node_modules (must be installed locally before push)
    - /bin/cp -r backend/node_modules $DEPLOYPATH/
    
    # Copy database schema and migrations
    - /bin/mkdir -p $DEPLOYPATH/src/database
    - /bin/cp -r backend/src/database/migrations $DEPLOYPATH/src/database/
    - /bin/cp -r backend/src/database/schema $DEPLOYPATH/src/database/