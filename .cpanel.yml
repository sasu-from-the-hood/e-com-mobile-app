---
deployment:
  tasks:
    # Set deployment path to domain folder
    - export DEPLOYPATH=/home/$(whoami)/one.solvesphr.com
    
    # Create domain directory
    - /bin/mkdir -p $DEPLOYPATH
    
    # Copy built backend files (must be built locally before push)
    - /bin/cp -r backend/dist/* $DEPLOYPATH/
    
    # Copy frontend build
    - /bin/cp -r backend/front-end-build $DEPLOYPATH/
    
    # Copy package files
    - /bin/cp backend/package.json $DEPLOYPATH/
    - /bin/cp backend/package-lock.json $DEPLOYPATH/
    
    # Copy .env file (optional - you'll add this manually on the server)
    - /bin/cp backend/.env $DEPLOYPATH/ || echo ".env not found - you need to create it on the server"
    
    # Copy drizzle config
    - /bin/cp backend/drizzle.config.ts $DEPLOYPATH/
    
    # Copy database migrations and schema from dist (compiled files)
    - /bin/mkdir -p $DEPLOYPATH/database
    - /bin/cp -r backend/dist/database/migrations $DEPLOYPATH/database/ || echo "No migrations found"
    - /bin/cp -r backend/dist/database/schema $DEPLOYPATH/database/ || echo "No schema found"
