version: 1

build:
  # Create e-com directory in root
  - command: mkdir -p ../e-com
    workdir: backend
  
  # Install dependencies
  - command: npm install
    workdir: backend
  
  # Build the backend
  - command: npm run build
    workdir: backend
  
  # Copy built files to e-com
  - command: cp -r dist ../e-com/
    workdir: backend
  
  # Copy package files
  - command: cp package.json package-lock.json ../e-com/
    workdir: backend
  
  # Copy .env file
  - command: cp .env ../e-com/
    workdir: backend
  
  # Copy drizzle config
  - command: cp drizzle.config.ts ../e-com/
    workdir: backend
  
  # Copy database migrations
  - command: cp -r src/database/migrations ../e-com/migrations
    workdir: backend
  
  # Install production dependencies in e-com
  - command: npm install --production
    workdir: ../e-com

deploy:
  # Run database migrations
  - command: npm run migrate:run
    workdir: ../e-com